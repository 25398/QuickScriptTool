<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>鼠大侠</title>
  <style>
    :root {
      --bg: #ffffff;
      --ink: #1a1a1a;
      --muted: #8a8f98;
      --line: #eceef1;
      --hover: #f5f6f8;
      --accent: #2f6fed;
      --danger: #d14343;
      --ok: #1a7f37;
      --font: "Segoe UI", "Microsoft YaHei UI", "PingFang SC", sans-serif;
    }
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      width: 320px;
      background: var(--bg);
      color: var(--ink);
      font-family: var(--font);
      font-size: 13px;
    }
    .top {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 12px 14px 10px;
      border-bottom: 1px solid var(--line);
    }
    .brand {
      flex: 1;
      font-size: 15px;
      font-weight: 650;
      letter-spacing: 0.02em;
      min-width: 0;
    }
    .icon-btn {
      width: 28px;
      height: 28px;
      border: 0;
      background: transparent;
      color: var(--muted);
      border-radius: 6px;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 0;
    }
    .icon-btn:hover { background: var(--hover); color: var(--ink); }
    .switch {
      position: relative;
      width: 40px;
      height: 22px;
      flex-shrink: 0;
    }
    .switch input { opacity: 0; width: 0; height: 0; }
    .slider {
      position: absolute;
      inset: 0;
      background: #cfd3da;
      border-radius: 999px;
      cursor: pointer;
      transition: background 0.15s ease;
    }
    .slider::before {
      content: "";
      position: absolute;
      width: 18px;
      height: 18px;
      left: 2px;
      top: 2px;
      background: #fff;
      border-radius: 50%;
      transition: transform 0.15s ease;
      box-shadow: 0 1px 2px rgba(0,0,0,0.18);
    }
    .switch input:checked + .slider { background: var(--accent); }
    .switch input:checked + .slider::before { transform: translateX(18px); }
    .switch input:disabled + .slider { opacity: 0.45; cursor: default; }

    .status {
      padding: 8px 14px 0;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.4;
      min-height: 20px;
    }
    .status.err { color: var(--danger); }
    .status.ok { color: var(--ok); }

    .section-head {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 12px 14px 6px;
      color: var(--muted);
      font-size: 12px;
      user-select: none;
      cursor: pointer;
    }
    .section-head .chev {
      width: 0;
      height: 0;
      border-top: 4px solid transparent;
      border-bottom: 4px solid transparent;
      border-left: 5px solid var(--muted);
      transition: transform 0.12s ease;
    }
    .section-head.open .chev { transform: rotate(90deg); }
    .section-head .count {
      margin-left: auto;
      font-variant-numeric: tabular-nums;
    }

    .list {
      max-height: 340px;
      overflow-y: auto;
      padding: 0 6px 8px;
    }
    .list.collapsed { display: none; }
    .empty {
      padding: 28px 14px 36px;
      text-align: center;
      color: var(--muted);
      font-size: 13px;
    }
    .item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 9px 10px;
      border-radius: 8px;
      cursor: pointer;
    }
    .item:hover { background: var(--hover); }
    .item.active { background: #eef3ff; }
    .item .name {
      flex: 1;
      min-width: 0;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      font-weight: 500;
    }
    .item .run-hint {
      font-size: 11px;
      color: var(--accent);
      flex-shrink: 0;
    }
    .item .stop-btn {
      border: 0;
      background: transparent;
      color: var(--danger);
      font-size: 12px;
      cursor: pointer;
      padding: 2px 6px;
      border-radius: 4px;
      flex-shrink: 0;
    }
    .item .stop-btn:hover { background: #fdecec; }

    .foot {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 14px 10px;
      border-top: 1px solid var(--line);
      color: var(--muted);
      font-size: 11px;
    }
    .foot a {
      color: var(--muted);
      text-decoration: none;
    }
    .foot a:hover { color: var(--ink); }
  </style>
</head>
<body>
  <div class="top">
    <div class="brand">鼠大侠</div>
    <label class="switch" title="启用后可从列表运行脚本；关闭则停止并禁止运行">
      <input type="checkbox" id="masterToggle" disabled />
      <span class="slider"></span>
    </label>
    <button type="button" class="icon-btn" id="btnSettings" title="设置" aria-label="设置">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
        <circle cx="12" cy="12" r="3"/>
        <path d="M19.4 15a1.7 1.7 0 0 0 .3 1.8l.1.1a2 2 0 1 1-2.8 2.8l-.1-.1a1.7 1.7 0 0 0-1.8-.3 1.7 1.7 0 0 0-1 1.5V21a2 2 0 1 1-4 0v-.1a1.7 1.7 0 0 0-1-1.5 1.7 1.7 0 0 0-1.8.3l-.1.1a2 2 0 1 1-2.8-2.8l.1-.1a1.7 1.7 0 0 0 .3-1.8 1.7 1.7 0 0 0-1.5-1H3a2 2 0 1 1 0-4h.1a1.7 1.7 0 0 0 1.5-1 1.7 1.7 0 0 0-.3-1.8l-.1-.1a2 2 0 1 1 2.8-2.8l.1.1a1.7 1.7 0 0 0 1.8.3h0a1.7 1.7 0 0 0 1-1.5V3a2 2 0 1 1 4 0v.1a1.7 1.7 0 0 0 1 1.5 1.7 1.7 0 0 0 1.8-.3l.1-.1a2 2 0 1 1 2.8 2.8l-.1.1a1.7 1.7 0 0 0-.3 1.8v0a1.7 1.7 0 0 0 1.5 1H21a2 2 0 1 1 0 4h-.1a1.7 1.7 0 0 0-1.5 1z"/>
      </svg>
    </button>
    <button type="button" class="icon-btn" id="btnRefresh" title="刷新" aria-label="刷新">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
        <path d="M21 12a9 9 0 1 1-2.6-6.3"/>
        <path d="M21 3v6h-6"/>
      </svg>
    </button>
  </div>

  <div class="status" id="statusText">正在连接鼠大侠…</div>

  <div class="section-head open" id="sectionToggle">
    <span class="chev"></span>
    <span>脚本宏</span>
    <span class="count" id="scriptCount"></span>
  </div>
  <div class="list" id="scriptList">
    <div class="empty" id="emptyState">暂无数据</div>
  </div>

  <div class="foot">
    <span id="verText">v—</span>
    <a href="#" id="linkOptions">选项页</a>
  </div>
  <script src="popup.js"></script>
</body>
</html>
